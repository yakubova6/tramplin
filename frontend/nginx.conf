user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    types_hash_max_size 2048;

    # важно для POST запросов
    client_max_body_size 10M;

    server {
        listen 80;

        root /usr/share/nginx/html;

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # общие proxy настройки
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;

        # AUTH SERVICE (ВАЖНО: без / в конце)
        location /api/auth/ {
            proxy_pass http://auth:9999;
        }

        # PROFILE SERVICE
        location /api/profile/ {
            proxy_pass http://profile:8080;
        }

        # MODERATION SERVICE
        location /api/moderation/ {
            proxy_pass http://moderation:8082;
        }

        # MEDIA SERVICE
        location /api/media/ {
            proxy_pass http://media:8091;
        }

        # OPPORTUNITY SERVICE
        location /api/opportunity/ {
            proxy_pass http://opportunity:8081;
        }

        # INTERACTION SERVICE
        location /api/interaction/ {
            proxy_pass http://interaction:8083;
        }

        # GEO SERVICE
        location /api/geo/ {
            proxy_pass http://geo:8084;
        }
    }
}