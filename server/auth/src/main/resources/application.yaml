server:
  port: ${PORT:9999}

spring:
  application:
    name: auth

  datasource:
    url: ${PROFILE_DB_URL}
    username: ${PROFILE_DB_USERNAME}
    password: ${PROFILE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuthHikariPool
      maximum-pool-size: 6
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 540000
      keepalive-time: 240000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

auth:
  session:
    cookie-name: sessionId
    ttl-seconds: 86400
    secure-cookie: false
    same-site: Lax

internal-api:
  api-key: ${INTERNAL_API_KEY}

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
    csrf:
      enabled: true
      cookie-name: XSRF-TOKEN
      header-name: X-XSRF-TOKEN
