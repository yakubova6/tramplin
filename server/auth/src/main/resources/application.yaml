server:
  port: ${PORT:9999}

spring:
  application:
    name: auth

  datasource:
    url: ${PROFILE_DB_URL}
    username: ${PROFILE_DB_USERNAME}
    password: ${PROFILE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: AuthHikariPool
      maximum-pool-size: 6
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 540000
      keepalive-time: 240000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

management:
  health:
    email:
      enabled: false

auth:
  session:
    cookie-name: sessionId
    ttl-seconds: 86400
    secure-cookie: false
    same-site: Lax

moderation:
  service:
    url: ${MODERATION_SERVER_HOST:http://localhost:8082}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

  password-reset:
    code-ttl-minutes: ${PASSWORD_RESET_CODE_TTL_MINUTES:10}
    reset-token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:10}
    resend-cooldown-seconds: ${PASSWORD_RESET_RESEND_COOLDOWN_SECONDS:60}
    max-verify-attempts: ${PASSWORD_RESET_MAX_VERIFY_ATTEMPTS:5}
    mail-from: ${PASSWORD_RESET_MAIL_FROM:no-reply@tramplin.local}
    subject: "${PASSWORD_RESET_MAIL_SUBJECT:Код сброса пароля Tramplin}"

  two-factor:
    code-ttl-minutes: ${TWO_FACTOR_CODE_TTL_MINUTES:10}
    resend-cooldown-seconds: ${TWO_FACTOR_RESEND_COOLDOWN_SECONDS:60}
    max-verify-attempts: ${TWO_FACTOR_MAX_VERIFY_ATTEMPTS:5}
    mail-from: ${TWO_FACTOR_MAIL_FROM:no-reply@tramplin.local}
    login-subject: "${TWO_FACTOR_LOGIN_MAIL_SUBJECT:Код входа Tramplin}"
    enable-subject: "${TWO_FACTOR_ENABLE_MAIL_SUBJECT:Подтверждение включения 2FA Tramplin}"
    disable-subject: "${TWO_FACTOR_DISABLE_MAIL_SUBJECT:Подтверждение отключения 2FA Tramplin}"

internal-api:
  api-key: ${INTERNAL_API_KEY}

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
    csrf:
      enabled: true
      cookie-name: XSRF-TOKEN
      header-name: X-XSRF-TOKEN
