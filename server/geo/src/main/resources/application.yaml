server:
  port: ${PORT:8084}

spring:
  application:
    name: geo
  datasource:
    url: ${PROFILE_DB_URL}
    username: ${PROFILE_DB_USERNAME}
    password: ${PROFILE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: GeoHikariPool
      maximum-pool-size: 2
      minimum-idle: 0
      idle-timeout: 120000
      max-lifetime: 540000
      keepalive-time: 240000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

auth:
  service:
    url: ${AUTH_SERVER_HOST:http://localhost:9999}

dadata:
  url: ${DADATA_URL:https://suggestions.dadata.ru}
  api-key: ${DADATA_API_KEY:}

geo:
  cache:
    cities-ttl: ${GEO_CACHE_CITIES_TTL:10m}
    address-suggest-ttl: ${GEO_CACHE_ADDRESS_SUGGEST_TTL:2m}
    address-resolve-ttl: ${GEO_CACHE_ADDRESS_RESOLVE_TTL:10m}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

internal-api:
  api-key: ${INTERNAL_API_KEY}
