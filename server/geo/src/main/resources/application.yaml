server:
  port: ${PORT:8084}

spring:
  application:
    name: geo
  datasource:
    url: ${PROFILE_DB_URL}
    username: ${PROFILE_DB_USERNAME}
    password: ${PROFILE_DB_PASSWORD}

auth:
  service:
    url: ${AUTH_SERVER_HOST:http://localhost:9999}
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

internal-api:
  api-key: ${INTERNAL_API_KEY}
