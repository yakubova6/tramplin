server:
  port: ${PORT:8083}

spring:
  application:
    name: interaction
  datasource:
    url: ${PROFILE_DB_URL}
    username: ${PROFILE_DB_USERNAME}
    password: ${PROFILE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: InteractionHikariPool
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 180000
      max-lifetime: 540000
      keepalive-time: 240000
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

auth:
  service:
    url: ${AUTH_SERVER_HOST:http://localhost:9999}

opportunity:
  service:
    url: ${OPPORTUNITY_SERVER_HOST:http://localhost:8081}
media:
  service:
    url: ${MEDIA_SERVER_HOST:http://localhost:8091}
profile:
  service:
    url: ${PROFILE_SERVER_HOST:http://localhost:8080}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

internal-api:
  api-key: ${INTERNAL_API_KEY}

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
    filter: true
